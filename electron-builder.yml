appId: com.governor.clerk
productName: Clerk
copyright: "Copyright (c) 2026 James Beck"

directories:
  output: release
  buildResources: build

# What goes into the asar
files:
  - dist/**/*
  # Exclude dev artifacts
  - "!dist/**/*.d.ts"
  - "!dist/**/*.d.ts.map"
  - "!dist/**/*.js.map"
  # Exclude ESM preload (we ship the CJS bundle)
  - "!dist/preload/index.js"
  # Exclude renderer source artifacts (Vite already bundled)
  - "!dist/renderer/src/**"

asar: true

linux:
  target:
    - AppImage
    - deb
  category: Utility

mac:
  target:
    - dmg
  category: public.app-category.productivity

win:
  target:
    - nsis

nsis:
  oneClick: true
  perMachine: false

dmg:
  writeUpdateInfo: false
